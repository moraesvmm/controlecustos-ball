name: Daily Burn Rate Forecast

on:
  schedule:
    # Roda todos os dias as 03:00 da manha UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Permite rodar manualmente no GitHub Actions UI

jobs:
  run-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: Run daily forecast script
        run: python .github/scripts/daily_forecast.py
